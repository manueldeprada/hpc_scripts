# Right side: user@host, shown only over SSH (or as root), like p10k's context.
[username]
show_always = false
style_user = "fg:color_yellow"
style_root = "fg:color_red"
format = '[ $user]($style)'

[hostname]
ssh_only = true
style = "fg:color_yellow"
format = '[@$hostname]($style)'

[character]
disabled = false
success_symbol = '[´É▓](bold fg:color_green)'
error_symbol = '[´É▓](bold fg:color_red)'
vimcmd_symbol = '[´É┤](bold fg:color_green)'
