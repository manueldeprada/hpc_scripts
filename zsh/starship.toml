# hpc_scripts shared starship prompt (synced across machines)
# Base: gruvbox-rainbow preset, restructured:
#   left  = os / directory / git rainbow
#   right = environment + language info (conda/venv, docker, versions)
# Python shows the active venv, not the version. Single line, no time.
# Needs a Nerd Font: https://www.nerdfonts.com/
# NOTE: generated so the powerline glyphs survive; edit freely, they are real
# characters in this file.

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
command_timeout = 1000   # HPC network filesystems can be slow

# Left prompt: the gruvbox rainbow.
format = """
[](color_orange)\
$os\
[](bg:color_yellow fg:color_orange)\
$directory\
[](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[](fg:color_aqua)\
 $character"""

# Right prompt: environment first, then language versions. Plain colored text.
right_format = """
$conda\
$python\
$docker_context\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = false
style = "bg:color_orange fg:color_fg0"
# Leading space so the left cap does not swallow the OS symbol.
format = "[ $symbol ]($style)"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

[directory]
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'

# ---- right-side environment ----

[conda]
symbol = "◯ "
style = "fg:color_aqua"
format = '[ $symbol$environment]($style)'

# Show only that a venv is active (its name), never the python version.
[python]
symbol = " "
style = "fg:color_green"
format = '[ $symbol$virtualenv]($style)'

[docker_context]
symbol = " "
style = "fg:color_blue"
format = '[ $symbol$context]($style)'

# ---- right-side language versions ----

[c]
symbol = " "
style = "fg:color_blue"
format = '[ $symbol( $version)]($style)'

[cpp]
symbol = " "
style = "fg:color_blue"
format = '[ $symbol( $version)]($style)'

[rust]
symbol = ""
style = "fg:color_red"
format = '[ $symbol( $version)]($style)'

[golang]
symbol = ""
style = "fg:color_blue"
format = '[ $symbol( $version)]($style)'

[nodejs]
symbol = ""
style = "fg:color_green"
format = '[ $symbol( $version)]($style)'

[bun]
symbol = ""
style = "fg:color_green"
format = '[ $symbol( $version)]($style)'

[php]
symbol = ""
style = "fg:color_purple"
format = '[ $symbol( $version)]($style)'

[java]
symbol = ""
style = "fg:color_red"
format = '[ $symbol( $version)]($style)'

[kotlin]
symbol = ""
style = "fg:color_purple"
format = '[ $symbol( $version)]($style)'

[haskell]
symbol = ""
style = "fg:color_purple"
format = '[ $symbol( $version)]($style)'

[character]
disabled = false
success_symbol = '[](bold fg:color_green)'
error_symbol = '[](bold fg:color_red)'
vimcmd_symbol = '[](bold fg:color_green)'
