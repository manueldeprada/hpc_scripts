# hpc_scripts shared starship prompt (synced across machines)
# Base: gruvbox-rainbow preset, restructured:
#   left  = os / directory / git rainbow
#   right = environment + language info (conda/venv, docker, versions)
# Python shows the active venv, not the version. Single line, no time.
# Needs a Nerd Font: https://www.nerdfonts.com/
# NOTE: generated so the powerline glyphs survive; edit freely, they are real
# characters in this file.

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
command_timeout = 1000   # HPC network filesystems can be slow
scan_timeout = 500       # cluster dirs behind a proxy scan slower than the 30ms default

# Left prompt: the gruvbox rainbow.
format = """
[¯éÂ](color_orange)\
$os\
[¯é░](bg:color_yellow fg:color_orange)\
$directory\
[¯é░](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[¯é┤](fg:color_aqua)\
 $character"""

# Right prompt: environment first, then language versions. Plain colored text.
right_format = """
$conda\
$python\
$docker_context\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$username\
$hostname"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[os]
disabled = false
style = "bg:color_orange fg:color_fg0"
# Leading space so the left cap does not swallow the OS symbol.
format = "[ $symbol ]($style)"

[os.symbols]
Windows = "¾░ı▓"
Ubuntu = "¾░òê"
SUSE = "´îö"
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¾░ÇÁ"
Manjaro = "´îÆ"
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "¯£Ä"
AOSC = "´îü"
Arch = "¾░úç"
Artix = "¾░úç"
EndeavourOS = "´åù"
CentOS = "´îä"
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
Pop = "´î¬"

[directory]
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇĞ/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = " "
"Music" = "¾░ØÜ "
"Pictures" = " "
"Developer" = "¾░▓ï "

[git_branch]
symbol = "´Éİ"
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'

# ---- right-side environment ----

[conda]
symbol = "Ôù» "
style = "fg:color_aqua"
format = '[ $symbol$environment]($style)'

# Show only that a venv is active (its name), never the python version.
[python]
symbol = "¯İå "
style = "fg:color_green"
format = '[ $symbol$virtualenv]($style)'

[docker_context]
symbol = "´îê "
style = "fg:color_blue"
format = '[ $symbol$context]($style)'

# ---- right-side language versions ----

[c]
symbol = "¯İŞ "
style = "fg:color_blue"
format = '[ $symbol( $version)]($style)'

[cpp]
symbol = "¯İØ "
style = "fg:color_blue"
format = '[ $symbol( $version)]($style)'

[rust]
symbol = "¯Ş¿"
style = "fg:color_red"
format = '[ $symbol( $version)]($style)'

[golang]
symbol = "¯İğ"
style = "fg:color_blue"
format = '[ $symbol( $version)]($style)'

[nodejs]
symbol = "¯£İ"
style = "fg:color_green"
format = '[ $symbol( $version)]($style)'

[bun]
symbol = "¯Ø»"
style = "fg:color_green"
format = '[ $symbol( $version)]($style)'

[php]
symbol = "¯İê"
style = "fg:color_purple"
format = '[ $symbol( $version)]($style)'

[java]
symbol = "¯ëû"
style = "fg:color_red"
format = '[ $symbol( $version)]($style)'

[kotlin]
symbol = "¯İ┤"
